name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    env:
      SCONS_CACHE: ${{ github.workspace }}/build/.scons-cache
      SCONS_VERSION: "4.10.1"

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEFN_ASSETS_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEFN_ASSETS_APP_PRIVATE_KEY }}
          owner: e-soul
          repositories: |
            defn
            defn-assets
          permission-contents: read

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Windows build
        uses: ./.github/actions/setup-windows-build
        with:
          scons-cache: ${{ env.SCONS_CACHE }}
          scons-version: ${{ env.SCONS_VERSION }}

      - name: Build and export Windows release
        run: python scripts/build.py --build-version "${{ github.ref_name }}"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: build/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/*.zip